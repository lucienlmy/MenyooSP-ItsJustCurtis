name: Development-Joy【Master_Build 复制改进】

on:
  push:
    branches: [ "Development-Joy" ]
  workflow_dispatch:
  #workflow_run:
  #  workflows: ["MSBuild"]
  #  types:
  #    - completed



env:
  BUILD_CONFIGURATION: Release
  CANCELJOB: false

permissions:
  contents: write
  pull-requests: write

jobs:
  check-version-and-merge:
    runs-on: ubuntu-latest
    outputs:
      CANCELJOB: ${{ steps.set_output.outputs.CANCELJOB }}
      VERSION: ${{ steps.increment_version.outputs.VERSION }}

    steps:
      - name: Checkout repository
        if: env.CANCELJOB != 'true'  
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Calculate Version with Commit Count
        id: calculate_version
        if: env.CANCELJOB != 'true'
        shell: bash
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          BASE_VERSION=$(grep '#define MENYOO_CURRENT_VER_' Solution/source/macros.h | awk '{print $3}' | tr -d '"')
          VERSION="v${BASE_VERSION}.${COMMIT_COUNT}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Check if tag already exists and increment version
        id: increment_version
        if: env.CANCELJOB != 'true'
        shell: bash
        run: |
          BASE_VERSION=${{ env.VERSION }}
          COUNTER=1
          FINAL_VERSION=$BASE_VERSION

          echo "Checking if version $BASE_VERSION exists..."
          # Check using GitHub API first
          while gh api repos/${{ github.repository }}/git/ref/tags/$FINAL_VERSION --silent >/dev/null 2>&1; do
            echo "Version $FINAL_VERSION already exists, incrementing..."
            FINAL_VERSION="${BASE_VERSION}.${COUNTER}"
            COUNTER=$((COUNTER + 1))
            echo "Trying new version: $FINAL_VERSION"
          done

          # Double-check with git ls-remote as fallback
          if git ls-remote --tags origin "refs/tags/$FINAL_VERSION" | grep -q "$FINAL_VERSION"; then
            echo "Fallback check found existing tag $FINAL_VERSION, incrementing further..."
            FINAL_VERSION="${BASE_VERSION}.${COUNTER}"
            COUNTER=$((COUNTER + 1))
          fi

          echo "Final version after increment checks: $FINAL_VERSION"
          echo "VERSION=$FINAL_VERSION" >> $GITHUB_ENV
          echo "VERSION=$FINAL_VERSION" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Check version pattern and merge
        id: check_version
        if: env.CANCELJOB != 'true' 
        run: |
          VERSION=${{ env.VERSION }}
          echo "Checking version pattern: $VERSION"
          if [[ $GITHUB_REF == "refs/heads/main" ]]; then
            echo "Already on main branch. Skipping merge check."
            exit 0
          fi

          # 获取当前分支名
          CURRENT_BRANCH=$(echo $GITHUB_REF | sed 's/refs\/heads\///')
          echo "Current branch: $CURRENT_BRANCH"

          # Function to check for existing PR with the same version
          check_pr_exists() {
            PR_LIST=$(gh pr list --head $CURRENT_BRANCH --base main --state open --json title,body)
            PR_EXIST=$(echo "$PR_LIST" | jq -r --arg VERSION "$VERSION" '.[] | select((.title | contains($VERSION)) or (.body | contains($VERSION)))')
            [ -n "$PR_EXIST" ]
          }

          if [[ $VERSION =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version is a full release. Creating pull request to merge into main."
            echo "## Check for existing PR"
            if check_pr_exists; then
              echo "PR already exists with version $VERSION."
              echo "CANCELJOB=true" >> $GITHUB_ENV
              exit 0
            fi
            echo "Creating new PR."
            gh pr create --title "Release $VERSION" --body "Merging $CURRENT_BRANCH into main for release $VERSION" --base main --head $CURRENT_BRANCH
            echo "CANCELJOB=true" >> $GITHUB_ENV
            exit 0
          elif [[ $VERSION =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(a|b|rc)[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Version is a pre-release. Proceeding with pre-release build."
          elif [[ $VERSION =~ ^v?[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Version is a build version with commit count. Proceeding with build."
          else
            echo "Version is invalid or a development version. Cancelling workflow."
            echo "CANCELJOB=true" >> $GITHUB_ENV
            exit 0
          fi
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set output
        id: set_output
        run: echo "CANCELJOB=${{ env.CANCELJOB }}" >> $GITHUB_OUTPUT

  build:
    runs-on: windows-latest
    needs: check-version-and-merge
    env:
      VERSION: ${{ needs.check-version-and-merge.outputs.VERSION }}

    steps:
    - name: Verify Version
      run: |
        if ([string]::IsNullOrEmpty("${{ env.VERSION }}")) {
          Write-Error "Version is empty or not set"
          exit 1
        }
        echo "Building version: ${{ env.VERSION }}"

    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Generate solution with Premake
      run: Solution/external/premake/premake5.exe vs2022

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.1

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:Platform=x64 Solution/Menyoo.sln -verbosity:minimal
      
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        # Artifact name
        name: MenyooSP
        path: |
          Solution/source/_Build/bin/Release/
          !Solution/source/_Build/bin/Release/Trash/
          !Solution/source/_Build/bin/Release/*.map
  
    - name: Cancel Workflow Action if build fails
      uses: vishnudxb/cancel-workflow@v1.2
      if: failure()
      with:
        repo: MAFINS/MenyooSP
        workflow_id: ${{ github.run_id }}
        access_token: ${{ github.token }}


  pre-release:
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Development' || github.ref == 'refs/heads/Development-Joy') && needs.check-version-and-merge.outputs.CANCELJOB != 'true'
    needs: [check-version-and-merge, build]
    permissions: write-all
    name: "Pre Release"
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.check-version-and-merge.outputs.VERSION }}

    steps:
      - name: Debug Version
        run: |
          echo "VERSION: ${{ env.VERSION }}"
          echo "check-version-and-merge VERSION: ${{ needs.check-version-and-merge.outputs.VERSION }}"

      - uses: actions/checkout@v3

      - uses: actions/download-artifact@v4

      - name: Rename asi file with version
        shell: pwsh
        run: |
          $version = "${{ env.VERSION }}"
          $sourceDir = "MenyooSP"
          
          Write-Host "Renaming asi files in $sourceDir with version $version"
          
          # 查找并重命名所有 .asi 文件
          Get-ChildItem -Path $sourceDir -Filter "*.asi" -Recurse | ForEach-Object {
            $newName = $_.Name -replace '^(.+)\.asi$', "`$1 $version.asi"
            $newPath = Join-Path $_.Directory $newName
            Write-Host "Renaming $($_.FullName) to $newPath"
            Rename-Item -Path $_.FullName -NewName $newName -Force
          }

      - name: Get commit messages
        id: get_commits
        shell: pwsh
        run: |
          # 确保完整克隆
          git fetch --prune --unshallow
          
          # 获取本次推送的提交范围
          $beforeSha = "${{ github.event.before }}"
          $afterSha = "${{ github.event.after }}"
          $features = @()
          $bugFixes = @()
          $others = @()
          
          Write-Host "获取从 $beforeSha 到 $afterSha 的提交"
          
          # 处理首次推送的情况（beforeSha 为空）
          if ([string]::IsNullOrEmpty($beforeSha)) {
              Write-Host "首次推送，只显示最新的提交"
              # 只显示最新的一个提交
              $hash = git rev-parse --short=7 HEAD
              $message = git log -1 --format="%s" HEAD
              $author = git log -1 --format="%an" HEAD
              $others += "- ${hash}: ${message} (${author})"
          } else {
              # 获取本次推送的所有提交
              $commits = git rev-list --reverse "$beforeSha..$afterSha"
              
              # 限制提交数量，最多处理10个最近的提交
              $limitedCommits = $commits | Select-Object -Last 10
              
              foreach ($commit in $limitedCommits) {
                  # 获取单个提交的详细信息
                  $hash = git rev-parse --short=7 $commit
                  $message = git log -1 --format="%s" $commit
                  $author = git log -1 --format="%an" $commit
                  
                  # 根据提交信息分类
                  if ($message -match 'feat' -or $message -match 'feature' -or $message -match 'add' -or $message -match 'added') {
                      $features += "- ${message} (${author})"
                  } elseif ($message -match 'fix' -or $message -match 'bug' -or $message -match 'fixed' -or $message -match 'repair') {
                      $bugFixes += "- ${message} (${author})"
                  } else {
                      $others += "- ${message} (${author})"
                  }
              }
          }
          
          # 构建提交信息
          $formattedCommits = @()
          
          if ($features.Count -gt 0) {
              $formattedCommits += "## Features"
              $features | ForEach-Object { $formattedCommits += $_ }
              $formattedCommits += ""
          }
          
          if ($bugFixes.Count -gt 0) {
              $formattedCommits += "## Bug Fixes"
              $bugFixes | ForEach-Object { $formattedCommits += $_ }
              $formattedCommits += ""
          }
          
          if ($others.Count -gt 0) {
              $formattedCommits += "## Other Changes"
              $others | ForEach-Object { $formattedCommits += $_ }
              $formattedCommits += ""
          }
          
          if ($formattedCommits.Count -eq 0) {
              Write-Host "未找到提交，使用最新提交"
              $hash = git rev-parse --short=7 HEAD
              $message = git log -1 --format="%s" HEAD
              $author = git log -1 --format="%an" HEAD
              $formattedCommits += "- ${hash}: ${message} (${author})"
          } elseif ($commits.Count -gt 10) {
              # 如果提交数量超过10个，添加省略说明
              $formattedCommits += "... 还有 $($commits.Count - 10) 个提交未显示"
          }
          
          # 将提交信息写入输出
          $commitMessage = $formattedCommits -join "`n"
          echo "commit_message<<EOF" >> $env:GITHUB_OUTPUT
          echo "$commitMessage" >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT
          
          Write-Host "本次推送的提交:"
          Write-Host $commitMessage
      - name: Create release zip
        shell: pwsh
        run: |
          $sourceDir = "MenyooSP"
          $zipFile = "MenyooSP-${{ env.VERSION }}.zip"
          
          Write-Host "Listing contents of MenyooSP folder:"
          Get-ChildItem $sourceDir -Recurse

          if (-Not (Test-Path $sourceDir)) {
            Write-Error "Source directory does not exist: $sourceDir"
            exit 1
          }

          if (Test-Path $zipFile) {
            Remove-Item $zipFile -Force
          }
          
          Compress-Archive -Path "$sourceDir\*" -DestinationPath $zipFile

          if (-Not (Test-Path $zipFile)) {
            Write-Error "Failed to create zip file: $zipFile"
            exit 1
          }

          Write-Host "Created zip file: $zipFile"
          Get-Item $zipFile

      - name: Copy asi file to root for separate release
        shell: pwsh
        run: |
          $sourceDir = "MenyooSP"
          # 查找并重命名后的 asi 文件，复制到根目录
          Get-ChildItem -Path $sourceDir -Filter "*${{ env.VERSION }}.asi" -Recurse | ForEach-Object {
            Write-Host "Copying $($_.FullName) to root"
            Copy-Item -Path $_.FullName -Destination . -Force
          }

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: "MenyooSP ${{ env.VERSION }}"
          body: |
            # 版本发布说明:

            ## 更新内容
            ${{ steps.get_commits.outputs.commit_message }}
            
            ## 提交详情
            ${{ github.event.head_commit.message }}
            
            ## 其他信息
            - 发布时间: ${{ format(github.event.head_commit.timestamp, 'yyyy-MM-dd HH:mm:ss') }}
            - 分支: ${{ github.ref_name }}
            - 构建: [Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            完整更新日志: https://github.com/${{ github.repository }}/commits/${{ github.sha }}
          prerelease: ${{ contains(env.VERSION, 'a') || contains(env.VERSION, 'b') || contains(env.VERSION, 'rc') }}
          files: |
            MenyooSP-${{ env.VERSION }}.zip
            *${{ env.VERSION }}.asi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}